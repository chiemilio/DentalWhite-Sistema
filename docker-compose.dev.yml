version: '3.8'

services:
  # Aplicación en modo desarrollo con hot reload
  dental-white-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dental-white-dev
    ports:
      - "5173:5173"  # Puerto por defecto de Vite
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001
    networks:
      - dental-white-dev-network
    command: pnpm run dev --host
    stdin_open: true
    tty: true

networks:
  dental-white-dev-network:
    driver: bridge
