# Docker Compose para Dental White - Stack Completo
# Backend: FastAPI + PostgreSQL + pgAdmin + Nginx
services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:17.2-alpine
    container_name: dental_white_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dental_white}
      POSTGRES_USER: ${POSTGRES_USER:-dental_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dental_secret_2026}
    # ports:  # Solo accesible desde la red interna Docker
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dental_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental_admin -d dental_white"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin para administración de base de datos
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: dental_white_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@dentalwhite.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_LISTEN_PORT: 80
    # ports:  # Solo accesible desde la red interna Docker
    #   - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dental_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - postgres

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dental_white_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://dental_admin:dental_secret_2026@postgres:5432/dental_white}
      SECRET_KEY: ${SECRET_KEY:-dental_jwt_dev_key_change_in_production_32chars}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    # ports:  # Solo accesible via nginx reverse proxy
    #   - "8000:8000"  # Deshabilitado: acceso solo via nginx
    volumes:
      - ./backend:/app
    networks:
      - dental_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Frontend (Nginx con archivos locales)
  frontend:
    image: nginx:1.27-alpine
    container_name: dental_white_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - dental_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  dental_network:
    driver: bridge
