# Docker Compose para Dental White
# Desarrollo local: docker compose up -d
# Producción (Render DB): docker compose --env-file .env.prod up -d

services:
  # Base de datos PostgreSQL (local)
  postgres:
    image: postgres:17.2-alpine
    container_name: dental_white_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dental_white}
      POSTGRES_USER: ${POSTGRES_USER:-dental_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dental_secret_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dental_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental_admin -d dental_white"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin para administración de base de datos
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: dental_white_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@dentalwhite.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dental_network
    restart: unless-stopped
    depends_on:
      - postgres

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dental_white_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://dental_admin:dental_secret_2026@postgres:5432/dental_white}
      SECRET_KEY: ${SECRET_KEY:-dental_jwt_dev_key_change_in_production_32chars}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PORT: 8000
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - dental_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (Nginx)
  frontend:
    image: nginx:1.27-alpine
    container_name: dental_white_frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dental_network
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  dental_network:
    driver: bridge
