# Render Blueprint - Dental White Backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: dental-white-api
    runtime: docker
    region: ohio
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://deltawhitetest.vercel.app
      - key: ENVIRONMENT
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PROJECT_NAME
        value: "Dental White API"
      - key: VERSION
        value: "3.0.0"
      - key: LOG_LEVEL
        value: INFO
