version: '3.8'

services:
  # ===========================================
  # INFRAESTRUCTURA
  # ===========================================

  # PostgreSQL - Base de datos principal
  postgres:
    image: postgres:16-alpine
    container_name: dental-postgres
    environment:
      POSTGRES_USER: dental_admin
      POSTGRES_PASSWORD: dental_secret_2026
      POSTGRES_DB: dental_white
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - dental-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache y sesiones
  redis:
    image: redis:7-alpine
    container_name: dental-redis
    command: redis-server --appendonly yes --requirepass dental_redis_2026
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dental-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ - Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dental-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: dental_admin
      RABBITMQ_DEFAULT_PASS: dental_rabbit_2026
      RABBITMQ_DEFAULT_VHOST: dental_vhost
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - dental-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: dental-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dental_admin
      MINIO_ROOT_PASSWORD: dental_minio_secret_2026
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    networks:
      - dental-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - Logs y auditoría
  mongodb:
    image: mongo:7
    container_name: dental-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: dental_admin
      MONGO_INITDB_ROOT_PASSWORD: dental_mongo_2026
      MONGO_INITDB_DATABASE: dental_logs
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - dental-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # API GATEWAY
  # ===========================================

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: dental-api-gateway
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_URL: redis://:dental_redis_2026@redis:6379
      JWT_SECRET: dental_jwt_super_secret_key_2026
      AUTH_SERVICE_URL: http://auth-service:3001
      USERS_SERVICE_URL: http://users-service:3002
      PATIENTS_SERVICE_URL: http://patients-service:3003
      APPOINTMENTS_SERVICE_URL: http://appointments-service:3004
      CONSULTATIONS_SERVICE_URL: http://consultations-service:3005
      PRESCRIPTIONS_SERVICE_URL: http://prescriptions-service:3006
      CLINICAL_HISTORY_SERVICE_URL: http://clinical-history-service:3007
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3008
      FILES_SERVICE_URL: http://files-service:3009
      REPORTS_SERVICE_URL: http://reports-service:3010
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - rabbitmq
    networks:
      - dental-network
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    restart: unless-stopped

  # ===========================================
  # MICROSERVICIOS
  # ===========================================

  # Auth Service
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: dental-auth-service
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://dental_admin:dental_secret_2026@postgres:5432/dental_auth
      REDIS_URL: redis://:dental_redis_2026@redis:6379
      JWT_SECRET: dental_jwt_super_secret_key_2026
      JWT_EXPIRES_IN: 7d
      REFRESH_TOKEN_EXPIRES_IN: 30d
      RABBITMQ_URL: amqp://dental_admin:dental_rabbit_2026@rabbitmq:5672/dental_vhost
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - dental-network
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    restart: unless-stopped

  # Users Service
  users-service:
    build:
      context: ./services/users-service
      dockerfile: Dockerfile
    container_name: dental-users-service
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://dental_admin:dental_secret_2026@postgres:5432/dental_users
      REDIS_URL: redis://:dental_redis_2026@redis:6379
      RABBITMQ_URL: amqp://dental_admin:dental_rabbit_2026@rabbitmq:5672/dental_vhost
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - dental-network
    volumes:
      - ./services/users-service:/app
      - /app/node_modules
    restart: unless-stopped

  # Patients Service
  patients-service:
    build:
      context: ./services/patients-service
      dockerfile: Dockerfile
    container_name: dental-patients-service
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://dental_admin:dental_secret_2026@postgres:5432/dental_patients
      REDIS_URL: redis://:dental_redis_2026@redis:6379
      RABBITMQ_URL: amqp://dental_admin:dental_rabbit_2026@rabbitmq:5672/dental_vhost
      FILES_SERVICE_URL: http://files-service:3009
    ports:
      - "3003:3003"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - dental-network
    volumes:
      - ./services/patients-service:/app
      - /app/node_modules
    restart: unless-stopped

  # Appointments Service
  appointments-service:
    build:
      context: ./services/appointments-service
      dockerfile: Dockerfile
    container_name: dental-appointments-service
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://dental_admin:dental_secret_2026@postgres:5432/dental_appointments
      REDIS_URL: redis://:dental_redis_2026@redis:6379
      RABBITMQ_URL: amqp://dental_admin:dental_rabbit_2026@rabbitmq:5672/dental_vhost
      PATIENTS_SERVICE_URL: http://patients-service:3003
      USERS_SERVICE_URL: http://users-service:3002
    ports:
      - "3004:3004"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - dental-network
    volumes:
      - ./services/appointments-service:/app
      - /app/node_modules
    restart: unless-stopped

  # ===========================================
  # MONITOREO Y OBSERVABILIDAD
  # ===========================================

  # Prometheus - Métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: dental-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - dental-network
    restart: unless-stopped

  # Grafana - Visualización
  grafana:
    image: grafana/grafana:latest
    container_name: dental-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: dental_grafana_2026
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "4000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    networks:
      - dental-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Jaeger - Trazas distribuidas
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: dental-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"  # UI
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    networks:
      - dental-network
    restart: unless-stopped

networks:
  dental-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  mongodb_data:
  prometheus_data:
  grafana_data:
